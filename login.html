<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <base href="./">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeGo - Login</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
    </div>
    <header>
        <nav class="navbar">
          <a href="index.html" class="logo">LuxeGo</a>
          <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="cars.html">Cars</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="wishlist.html">Wishlist</a></li>
            <li><a href="booking.html">Booking</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="admin.html">Admin</a></li>
          </ul>
          <div class="auth-buttons">
            <a href="login.html" class="btn">Login</a>
            <a href="signup.html" class="btn btn-primary">Sign Up</a>
          </div>
          <div class="theme-toggler">
            <i class="fas fa-sun"></i>
          </div>
          <div class="menu-btn">
            <i class="fas fa-bars"></i>
        </div>
        </nav>
      </header>

    <main>
        <section class="login-page">
            <div class="login-container">
                <h2>Welcome Back</h2>
                <p class="subtitle">Please enter your credentials to login</p>
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <input type="email" id="login-email" placeholder="name@example.com" required>
                        <div class="error-message"></div>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <div class="password-input-wrapper">
                            <input type="password" id="login-password" placeholder="Enter your password" required>
                            <i class="fas fa-eye-slash toggle-password" data-target-id="login-password"></i>
                        </div>
                        <div class="error-message"></div>
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
                <p><a href="#">Forgot your password?</a></p>
                <p>Don't have an account? <a href="signup.html">Sign up here</a>.</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 LuxeGo. All rights reserved.</p>
            <ul>
                <li><a href="faq.html">FAQ</a></li>
                <li><a href="reviews.html">Reviews</a></li>
            </ul>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/auth.js"></script>
</body>
</html>
