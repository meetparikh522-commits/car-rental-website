<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeGo - Booking Receipt</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        .receipt-page {
            padding: 60px 20px 80px 20px;
            text-align: center;
        }
        .receipt-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 30px;
            background-color: var(--card-background);
            border-radius: 8px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            text-align: center;
        }
        .receipt-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        .success .receipt-icon { color: #10b981; }
        .failed .receipt-icon { color: #ef4444; }
        
        .receipt-container h2 {
            margin: 0 0 10px 0;
            font-size: 1.8rem;
        }
        .receipt-container p {
            color: var(--text-muted);
            margin: 0 0 24px 0;
        }
        .receipt-details {
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
            margin-top: 20px;
            text-align: left;
        }
        .receipt-details h3 {
            margin: 0 0 16px 0;
            font-size: 1.2rem;
        }
        .receipt-details p {
            margin-bottom: 8px;
            color: var(--text-color);
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">LuxeGo</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="cars.html">Cars</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="wishlist.html">Wishlist</a></li>
            </ul>
            <div class="auth-buttons">
                <!-- Auth buttons will be dynamically added here -->
            </div>
            <div class="theme-toggler">
                <i class="fas fa-sun"></i>
            </div>
        </nav>
    </header>

    <main class="receipt-page">
        <div class="receipt-container" id="receipt-container">
            <!-- Receipt content will be generated by JavaScript -->
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 LuxeGo. All rights reserved.</p>
        </div>
    </footer>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const receiptContainer = document.getElementById('receipt-container');
            const urlParams = new URLSearchParams(window.location.search);
            const status = urlParams.get('status');

            let content = '';

            if (status === 'success') {
                const carId = urlParams.get('car_id');
                const pickupDate = urlParams.get('pickup_date');
                const dropoffDate = urlParams.get('dropoff_date');
                const price = urlParams.get('price');
                const method = urlParams.get('method');

                content = `
                    <div class="success">
                        <i class="fas fa-check-circle receipt-icon"></i>
                        <h2>Booking Successful!</h2>
                        <p>Your car has been booked. You will receive a confirmation email shortly.</p>
                        <div class="receipt-details">
                            <h3>Booking Summary</h3>
                            <p><strong>Pickup Date:</strong> ${pickupDate}</p>
                            <p><strong>Drop-off Date:</strong> ${dropoffDate}</p>
                            <p><strong>Total Price:</strong> ${price}</p>
                            <p><strong>Payment Method:</strong> ${method}</p>
                        </div>
                        <a href="index.html" class="btn btn-primary" style="margin-top: 2rem;">Back to Home</a>
                    </div>
                `;
            } else if (status === 'failed') {
                const reason = urlParams.get('reason');
                content = `
                    <div class="failed">
                        <i class="fas fa-times-circle receipt-icon"></i>
                        <h2>Payment Failed</h2>
                        <p>${reason || 'An unexpected error occurred.'}</p>
                        <a href="booking.html" class="btn btn-primary" style="margin-top: 2rem;">Try Again</a>
                    </div>
                `;
            } else {
                content = `<h2>Invalid Booking Status</h2>`;
            }

            receiptContainer.innerHTML = content;
        });
    </script>
</body>
</html>
