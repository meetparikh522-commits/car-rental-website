  <main class="cars-page">
    <div class="container">
      <aside class="filters">
        <div class="filter-group">
          <h3>Search</h3>
          <input type="text" id="search" placeholder="Search for a car...">
        </div>
        <div class="filter-group">
          <h3>Price</h3>
          <input type="range" id="price-range" min="30" max="2000">
          <span id="price-value">₹2,000</span>
        </div>
        <div class="filter-group">
          <h3>Brand</h3>
          <select id="brand-filter">
            <option value="">All</option>
          </select>
        </div>
        <div class="filter-group">
          <h3>Fuel</h3>
          <select id="fuel-filter">
            <option value="">All</option>
            <option value="Petrol">Petrol</option>
            <option value="Diesel">Diesel</option>
            <option value="Electric">Electric</option>
          </select>
        </div>
        <div class="filter-group">
          <h3>Seats</h3>
          <select id="seats-filter">
            <option value="">All</option>
            <option value="2">2</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="7">7</option>
          </select>
        </div>
        <div class="filter-group">
          <h3>Transmission</h3>
          <select id="transmission-filter">
            <option value="">All</option>
            <option value="Automatic">Automatic</option>
            <option value="Manual">Manual</option>
          </select>
        </div>
      </aside>
      <section class="cars-list">
        <div class="list-header">
          <h2>Our Cars</h2>
          <div class="sorting">
            <label for="sort-by">Sort by:</label>
            <select id="sort-by">
              <option value="price-asc">Price (Low to High)</option>
              <option value="price-desc">Price (High to Low)</option>
              <option value="name-asc">Name (A to Z)</option>
              <option value="name-desc">Name (Z to A)</option>
            </select>
          </div>
        </div>
        <div id="car-grid" class="car-grid"></div>
        <div class="pagination">
          <button id="prev-page">Previous</button>
          <span id="page-info"></span>
          <button id="next-page">Next</button>
        </div>
      </section>
    </div>
  </main>
